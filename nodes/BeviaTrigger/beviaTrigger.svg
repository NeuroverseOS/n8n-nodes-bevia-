<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Bevia trigger node icon. Navy square (inverse register) with a cream
       serif "B" mark and a small triangular "play / fire" indicator below
       to distinguish the trigger from the action node. -->
  <rect width="60" height="60" rx="8" fill="#002045"/>
  <text x="30" y="38"
        font-family="Newsreader, 'Times New Roman', Georgia, serif"
        font-size="32"
        font-weight="700"
        text-anchor="middle"
        fill="#f7f6f1">B</text>
  <!-- Trigger indicator: small right-pointing triangle below the mark. -->
  <polygon points="26,46 26,54 34,50" fill="#f7f6f1"/>
</svg>
